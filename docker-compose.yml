version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mku_cbo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mku_cbo_task_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: mku_cbo_backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/mku_cbo_task_tracker"
      JWT_SECRET: "your-jwt-key"
      JWT_EXPIRES_IN: "7d"
      PORT: 3001
      EXPO_ACCESS_TOKEN: "your-expo-access-token"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ./apps/backend/src:/app/src
      - /app/node_modules
    command: >
      sh -c "npx drizzle-kit push && npm run dev"

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
